services:
  # ============================================================
  # Backend API Service (Web Service)
  # ============================================================
  - type: web
    name: colorverse-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false  # Set in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://colorverse-4mkw.onrender.com
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_SECURE
        value: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: UPI_ID
        value: 9568804305@ybl
    healthCheckPath: /api/health

  # ============================================================
  # Frontend Static Site
  # ============================================================
  - type: web
    name: colorverse-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://colorverse2.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://colorverse2.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
